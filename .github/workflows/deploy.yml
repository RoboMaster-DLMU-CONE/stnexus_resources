name: Deploy VitePress

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stnexus-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 139.155.143.150
      DEPLOY_USER: stnexus-deploy
      DEPLOY_PATH: /www/wwwroot/stnexus.cone.wiki

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.STNEXUS_DEPLOY_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Fetch, build, and publish on the server
        run: |
          git bundle create deploy.bundle HEAD
          scp deploy.bundle "$DEPLOY_USER@$DEPLOY_HOST:/home/stnexus-deploy/stnexus_resources.bundle"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "set -eu; cd '$DEPLOY_PATH'; export npm_config_cache=/home/stnexus-deploy/.npm; mkdir -p /home/stnexus-deploy/.npm; git fetch /home/stnexus-deploy/stnexus_resources.bundle HEAD:refs/remotes/origin/main; git reset --hard origin/main; rm -f /home/stnexus-deploy/stnexus_resources.bundle; rm -rf node_modules; find docs/.vitepress/dist -mindepth 1 -maxdepth 1 ! -name .well-known -exec rm -rf {} +; npm ci; npm run docs:build"
          rm -f deploy.bundle
