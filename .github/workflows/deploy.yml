name: Deploy VitePress

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stnexus-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 139.155.143.150
      DEPLOY_USER: stnexus-deploy
      DEPLOY_PATH: /www/wwwroot/stnexus.cone.wiki

    steps:
      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.STNEXUS_DEPLOY_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Fetch, build, and publish on the server
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "set -eu; cd '$DEPLOY_PATH'; git fetch origin main; git reset --hard origin/main; npm ci; npm run docs:build"
